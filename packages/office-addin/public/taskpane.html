<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ValuClaw</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script type="module" src="./taskpane.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #111827;
        background: #f7f8fb;
      }
      body {
        margin: 0;
      }
      main {
        padding: 16px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }
      fieldset,
      section {
        border: 1px solid #d9e1ec;
        border-radius: 8px;
        background: white;
        margin: 0 0 12px;
        padding: 12px;
      }
      label {
        display: block;
        margin: 10px 0;
        font-size: 13px;
      }
      select,
      input,
      textarea,
      button {
        width: 100%;
        min-height: 36px;
        border-radius: 6px;
        border: 1px solid #d9e1ec;
        background: white;
        font: inherit;
      }
      textarea {
        box-sizing: border-box;
        min-height: 112px;
        padding: 8px;
        resize: vertical;
      }
      details {
        margin-top: 10px;
      }
      summary {
        cursor: pointer;
        color: #0f6cbd;
        font-size: 13px;
        font-weight: 600;
      }
      .secondary {
        margin-top: 8px;
        border-color: #d9e1ec;
        background: white;
        color: #0f6cbd;
      }
      button {
        border-color: #0f6cbd;
        background: #0f6cbd;
        color: white;
        font-weight: 600;
      }
      .muted {
        color: #5f6b7a;
        font-size: 12px;
        line-height: 1.5;
      }
      .badge {
        display: inline-flex;
        border-radius: 4px;
        background: #e7f5ec;
        color: #107c41;
        padding: 2px 6px;
        font-size: 12px;
        font-weight: 600;
      }
      pre {
        white-space: pre-wrap;
        background: #111827;
        color: #f9fafb;
        border-radius: 6px;
        padding: 10px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ValuClaw</h1>
      <p class="muted">Local development surface. The current workflow uses synthetic data only.</p>
      <fieldset>
        <legend>Run setup</legend>
        <label>
          Model route
          <select id="model-route" aria-label="Model route">
            <option value="auto">Auto</option>
          </select>
        </label>
        <details>
          <summary>Model roster</summary>
          <label>
            OpenRouter model IDs, one per line (up to five)
            <textarea id="model-options" aria-label="OpenRouter model roster"></textarea>
          </label>
          <button id="save-model-options" class="secondary" type="button">Save model roster</button>
          <p id="model-options-status" class="muted"></p>
        </details>
        <label>
          Skill
          <select id="skill">
            <option value="skill.weekly_update@0.1.0">Weekly update v0.1.0</option>
          </select>
        </label>
        <label>
          <input id="include-workbook" type="checkbox" checked />
          Include workbook context
        </label>
        <button id="generate">Generate draft in Word</button>
      </fieldset>
      <section>
        <strong>Approval</strong>
        <p id="approval" class="muted">Required before Outlook send or shared save.</p>
      </section>
      <section>
        <strong>Lineage</strong>
        <p id="lineage" class="muted">No run yet.</p>
      </section>
      <section>
        <strong>History</strong>
        <div id="history" class="muted">No preserved runs yet.</div>
      </section>
      <section>
        <span id="status" class="badge">ready</span>
        <pre id="artifact">Pick context and generate a synthetic draft.</pre>
      </section>
    </main>
  </body>
</html>
